<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncios</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }

        .moldura {
            position: relative;
            width: 100vw; /* Largura total da tela */
            height: 100vh; /* Altura total da tela */
            background: url('../static/img/fundo.png') no-repeat center center;
            background-size: cover;
        }

        .conteudo {
            position: absolute;
            top: 3%;  /* Ajuste para alinhar a área cinza */
            left: 15.5%; /* Ajuste para alinhar a área cinza */
            width: 83.8%; /* Ajuste conforme necessário */
            height: 92%; /* Ajuste conforme necessário */
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .conteudo img {
            width: 100%;
            height: 100%;
            object-fit: fill;  /* Faz a imagem se esticar para preencher a área, podendo distorcer */
        }
    </style>
</head>
<body>

       

    <div class="moldura">
        <div class="conteudo">
            <img id="imagemDinamica" src={{anuncios}}  width={{largura}} height={{altura}} alt="Imagem dinâmica">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const img = document.getElementById('imagemDinamica');
            console.log('altura', '{{altura}}');
            console.log('largura', '{{largura}}');
            const altura = parseInt('{{altura}}');
            const largura = parseInt('{{largura}}');

            
        });
    </script>

</body>
</html>
